<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Click</title>
</head>

<body>
    <h1>We Are Learning Event Click</h1>
    <button class="Darkmode" onclick="darkmode(event)">Change Dark mode</button>
    <button class="lightmode" onkeydown="lightmode(event)">Change Light mode</button>
</body>


<script>
    let darkmode = (e) => {
        document.body.style.backgroundColor = 'black';
        document.body.style.color = 'white';

        console.log(e.type);
        console.log(e.target)

    }

    let lightmode = (e) => {
        document.body.style.backgroundColor = 'white';
        document.body.style.color = 'black';

        console.log(e.type);
        console.log(e.target);

    }



</script>

</html>
