<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Story Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Lobster&family=Yuyu&family=Yuyu+Short&display=swap"

</head>

<body>
    <div class="navbar-container">
        <div class="navbar">
            <div class="left">
                <img src="img/images.jpeg" alt="">
            </div>
            <div class="center">
                <div class="items">
                    <span class="material-symbols-outlined">home</span> Home
                </div>

                <div class="items">
                    <span class="material-symbols-outlined">
                        search
                    </span> Search
                </div>

                <div class="items">
                    <span class="material-symbols-outlined">
                        explore
                    </span> Explore
                </div>

                <div class="items">
                    <span class="material-symbols-outlined">
                        movie
                    </span> Reels
                </div>

                <div class="items">
                    <span class="material-symbols-outlined">
                        favorite
                    </span> Likes
                </div>
            </div>
            <div class="right">
                <div class="items">
                    <span class="material-symbols-outlined">
                        Insert_chart
                    </span> Dashboard
                </div>
                <div class="items">
                    <img src="" alt="">
                </div>
            </div>

        </div>

</html>
