<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Lobster&family=Yuyu&family=Yuyu+Short&display=swap"
        rel="stylesheet">


<body>

    <div class="instragram">
        <div class="left-bar">
            <div class="items">
                <div id="logo">Instragram</div>
            </div>

            <div class="items">
                <span class="material-symbols-outlined">home</span> Home
            </div>

            <div class="items">
                <span class="material-symbols-outlined">
                    search
                </span> Search
            </div>

            <div class="items">
                <span class="material-symbols-outlined">
                    explore
                </span> Explore
            </div>

            <div class="items">
                <span class="material-symbols-outlined">
                    movie
                </span> Reels
            </div>

            <div class="items">
                <span class="material-symbols-outlined">
                    favorite
                </span> Likes
            </div>


            <div class="items">
                <span class="material-symbols-outlined">
                    add_circle
                </span> Create
            </div>

            <div class="items">
                <span class="material-symbols-outlined">
                    Insert_chart
                </span> Dashboard
            </div>
            <div class="items">
                <span class="material-symbols-outlined">
                    Account_circle
                </span> Profile
            </div>

            <div class="items">
                <span class="material-symbols-outlined">
                    Menu
                </span> More
            </div>

        </div>
        <div class="post">
            <div class="story">
                <div class="items">
                    <div class="profile">
                        <img src="profile.jpg" alt="Profile Picture" srcset="">
                    </div>
                    <p>Spider Man</p>
                </div>

            </div>
            <div class="main-post">

            </div>
        </div>
        <div class="suggestion_section">
        </div>

    </div>

</body>

</html>
